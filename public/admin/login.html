<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Rangga Triyanto</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-terminal: #1e252e;
            --accent-gray: #8b949e;
            --accent-light: #c9d1d9;
            --accent-highlight: #e6edf3;
            --accent-blue: #58a6ff;
            --prompt-green: #7ee787;
            --error-red: #f85149;
            --border-color: #30363d;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-primary);
            color: var(--accent-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 32px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            color: var(--prompt-green);
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--accent-gray);
            font-size: 0.875rem;
        }

        .login-form {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: var(--prompt-green);
            font-size: 0.875rem;
            margin-bottom: 8px;
        }

        .form-label::before {
            content: '$> ';
        }

        .form-input {
            width: 100%;
            background: var(--bg-terminal);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-light);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            background: var(--accent-blue);
            color: var(--bg-primary);
            border: none;
            border-radius: 6px;
            padding: 14px 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            background: #79b8ff;
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            margin-top: 16px;
            padding: 12px;
            background: rgba(248, 81, 73, 0.1);
            color: var(--error-red);
            border: 1px solid var(--error-red);
            border-radius: 6px;
            font-size: 0.875rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--accent-gray);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .back-link:hover {
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>$rangga_cms</h1>
            <p>Portfolio Content Management System</p>
        </div>
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label">username</label>
                <input type="text" class="form-input" id="username" placeholder="admin" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">password</label>
                <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
            <div class="error-message" id="errorMessage"></div>
        </form>
        <a href="/" class="back-link">&larr; Back to website</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/admin/dashboard';
                } else {
                    errorMessage.textContent = '[ERROR] ' + (data.error || 'Login failed');
                    errorMessage.classList.add('show');
                }
            } catch (err) {
                errorMessage.textContent = '[ERROR] Connection failed';
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
